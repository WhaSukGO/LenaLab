# CUDA image matrix for the VO lab (mirrors ver2's images/registry.yaml).
# Pre-built images only; runtime builds are disabled (that was a resource sink before).
#
# The classical-OpenCV MVP runs in LOCAL mode (CPU), so it needs NO image — this file may
# stay empty. The rows below are the later learned-VO (DPVO/DROID) upgrade path: add a
# pinned, pre-built image that already contains a CUDA-compiled torch + the VO deps, then
# switch the contract's framework + job_mode="docker".
images:
  # Track B live authoring + eval sandbox (CPU; numpy + opencv). Built from
  # docker/Dockerfile.cpu-opencv. Key contains "cpu" to match FrameworkSpec(name="cpu").
  - key: cpu-opencv
    image: "vo-cpu-opencv:1"
    cuda: ""
    healthcheck: "python -c 'import cv2, numpy; print(cv2.__version__)'"

